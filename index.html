<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday candle web</title>
  <link rel="icon" href="img/cake.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
</head>
  
<body>
  <!-- 터치 후에만 보임 -->
  <div id="top-text">초를 힘껏 불어주세요!</div>
  <div id="timer"></div>
  <div id="mic-bar-wrap">
    <span id="mic-label">🎤</span>
    <div id="mic-bar-track">
      <div id="mic-bar"></div>
    </div>
  </div>

  <!-- 항상 보임 -->
  <div id="candle-scene">
    <div id="flame-wrap">
      <div id="flame"></div>
    </div>
    <div id="wick"></div>
    <div id="candle-body"></div>
  </div>

  <canvas id="particle-canvas"></canvas>

  <!-- 결과 화면 -->
  <div id="result-screen">
    <h1 id="birthday-text">HAPPY BIRTHDAY!</h1>
    <div class="record" id="result-record"></div>
    <div class="wick-art">
      <div class="smoke"></div>
      <div class="wick-line"></div>
      <div class="candle-stub"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
