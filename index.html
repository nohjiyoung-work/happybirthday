<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday candle web</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- 메인 화면 -->
  <div id="top-text">초를 힘껏 불어주세요!</div>

  <div id="timer">⏱ 0.0s</div>

  <!-- 버튼 / 레벨 바 전환 영역 -->
<div id="mic-toggle">
  <button id="start-btn">시작하기</button>
  <div id="mic-bar-wrap">
    <span id="mic-label">🎤</span>
    <div id="mic-bar-track">
      <div id="mic-bar"></div>
    </div>
  </div>
</div>


  <div id="candle-scene">
    <div id="flame-wrap">
      <div id="flame"></div>
    </div>
    <div id="wick"></div>
    <div id="candle-body"></div>
  </div>

  <!-- 불꽃 파티클 캔버스 -->
  <canvas id="particle-canvas"></canvas>

  <!-- 결과 화면 -->
  <div id="result-screen">
    <h1>HAPPY BIRTHDAY!</h1>
    <div class="cake-emoji">🎂</div>
    <div class="record" id="result-record"></div>
    <div class="wick-art">
      <div class="smoke"></div>
      <div class="wick-line"></div>
      <div class="candle-stub"></div>
    </div>
  </div>

  <script src="candle.js"></script>
</body>

</html>
